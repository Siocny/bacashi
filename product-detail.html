<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>产品详情 - CAFELE & BACASHI</title>
    <link rel="stylesheet" href="assets/css/style.css?v=20260322020">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-brand">
                    <span class="logo-text">CAFELE</span>
                    <span class="logo-cn">卡斐乐</span>
                </div>
                <span class="logo-divider">|</span>
                <div class="logo-brand">
                    <span class="logo-text">BACASHI</span>
                    <span class="logo-cn">倍卡西</span>
                </div>
            </div>

            <!-- 主导航 -->
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-home nav-icon"></i>首页</a></li>
                <li><a href="products.html"><i class="fas fa-box nav-icon"></i>品牌产品</a></li>
                <li><a href="service.html"><i class="fas fa-headset nav-icon"></i>服务与支持</a></li>
                <li><a href="about.html"><i class="fas fa-users nav-icon"></i>关于我们</a></li>
            </ul>

            <!-- 右侧按钮 -->
            <div class="nav-right">
                <a href="service.html#contact" class="btn-buy">购买</a>
                <div class="search-box">
                    <input type="text" placeholder="请输入关键字" id="search-input">
                    <button class="search-btn" onclick="searchProducts()">🔍</button>
                </div>
            </div>

            <button class="mobile-menu-btn"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <!-- 产品详情 -->
    <main class="product-detail-page">
        <div class="container">
            <div class="product-detail-header">
                <a href="javascript:history.back()" class="back-link">
                    <i class="fas fa-arrow-left"></i> 返回产品列表
                </a>
            </div>

            <div id="product-detail-content">
                <!-- 内容由 JS 动态加载 -->
            </div>

            <!-- 产品说明书区域 -->
            <div id="product-manuals-section" class="product-manuals-section" style="display: none;">
                <div class="section-header">
                    <p class="section-subtitle">MANUALS</p>
                    <h2 class="section-title">产品说明书</h2>
                    <div class="section-line"></div>
                </div>
                <div id="product-manuals-container" class="manuals-wrap"></div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>关于 CAFELE</h4>
                    <p>专注于高品质车用电子产品的研发与销售</p>
                </div>
                <div class="footer-section">
                    <h4>联系方式</h4>
                    <p id="footer-email">邮箱：info@cafele.com</p>
                    <p id="footer-phone">电话：+86-123-4567-8900</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 CAFELE & BACASHI. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="assets/js/api.js?v=20260320004"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // 加载联系方式
        function loadFooterContact() {
            const contact = API.contact.get();
            if (contact) {
                const emailEl = document.getElementById('footer-email');
                const phoneEl = document.getElementById('footer-phone');
                if (emailEl && contact.email) {
                    emailEl.textContent = '邮箱：' + contact.email;
                }
                if (phoneEl && contact.phone) {
                    phoneEl.textContent = '电话：' + contact.phone;
                }
            }
        }

        // 搜索产品
        function searchProducts() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            if (!keyword) return;

            const products = API.products.getAll();
            const filtered = products.filter(p =>
                p.name.toLowerCase().includes(keyword) ||
                p.description.toLowerCase().includes(keyword) ||
                p.category.toLowerCase().includes(keyword)
            );

            if (filtered.length === 0) {
                alert('未找到相关产品');
            } else {
                window.location.href = 'products.html';
            }
        }

        // 页面加载时检测微信浏览器
        document.addEventListener('DOMContentLoaded', function() {
            loadFooterContact();
        });

        // 从 URL 获取产品 ID
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const brand = urlParams.get('brand') || 'cafele';

        if (!productId) {
            document.getElementById('product-detail-content').innerHTML = '<p class="error-message">未找到产品 ID</p>';
        } else {
            loadProductDetail(productId, brand);
        }

        function loadProductDetail(productId, brand) {
            let product;
            if (brand === 'bacashi') {
                const products = API.bacashi.products.get();
                product = products.find(p => p.id == productId);
            } else {
                const products = API.products.getAll();
                product = products.find(p => p.id == productId);
            }

            if (!product) {
                document.getElementById('product-detail-content').innerHTML = '<p class="error-message">未找到该产品</p>';
                document.title = '未找到 - 产品详情';
                return;
            }

            // 更新页面标题
            document.title = product.name + ' - 产品详情';

            // 构建产品详情 HTML
            const detailHtml = `
                <div class="product-detail-main">
                    <div class="product-detail-image">
                        <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/600x500?text=${brand === 'bacashi' ? 'BACASHI' : 'CAFELE'}'">
                    </div>
                    <div class="product-detail-info">
                        <span class="product-category-tag">${product.category}</span>
                        <h1 class="product-detail-title">${product.name}</h1>
                        <p class="product-detail-description">${product.description}</p>
                    </div>
                </div>
                <div class="product-detail-full">
                    ${product.video ? `
                    <div class="detail-section">
                        <h3><i class="fas fa-play-circle"></i> 产品视频</h3>
                        <div class="product-video">${getVideoEmbed(product.video)}</div>
                    </div>
                    ` : ''}
                    <div class="detail-section">
                        <h3><i class="fas fa-file-alt"></i> 产品说明书</h3>
                        <div class="detail-content">${product.details || '暂无说明书内容'}</div>
                    </div>
                </div>
            `;

            document.getElementById('product-detail-content').innerHTML = detailHtml;
        }

        // 获取视频嵌入代码
        function getVideoEmbed(url) {
            if (!url) return '';

            // YouTube
            const youtubeMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
            if (youtubeMatch) {
                return `<iframe src="https://www.youtube.com/embed/${youtubeMatch[1]}" frameborder="0" allowfullscreen></iframe>`;
            }

            // Bilibili
            const bilibiliMatch = url.match(/bilibili\.com\/video\/(?:av(\d+)|BV(\w+))/);
            if (bilibiliMatch) {
                const bvid = bilibiliMatch[2] ? `BV${bilibiliMatch[2]}` : `av${bilibiliMatch[1]}`;
                return `<iframe src="//player.bilibili.com/player.html?bvid=${bvid}&page=1" scrolling="no" border="0" frameborder="no" allowfullscreen></iframe>`;
            }

            // Tencent Video
            const tencentMatch = url.match(/v\.qq\.com\/x\/(?:page|cover)\/([a-z0-9]+)\.html/);
            if (tencentMatch) {
                return `<iframe src="https://v.qq.com/txp/iframe/player.html?vid=${tencentMatch[1]}" allowFullScreen="true"></iframe>`;
            }

            // 直接视频文件（mp4, webm, ogg）
            if (url.match(/\.(mp4|webm|ogg|mov)(\?.*)?$/i)) {
                return `<video src="${url}" controls style="width: 100%; max-width: 800px; height: auto;"></video>`;
            }

            // 其他链接尝试使用 video 标签
            if (url.startsWith('http') && url.includes('video')) {
                return `<video src="${url}" controls style="width: 100%; max-width: 800px; height: auto;"></video>`;
            }

            return `<p>视频链接：${url}</p>`;
        }

    </script>
</body>
</html>
