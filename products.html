<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>品牌产品 - CAFELE & BACASHI</title>
    <link rel="stylesheet" href="assets/css/style.css?v=20260322016">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-brand">
                    <span class="logo-text">CAFELE</span>
                    <span class="logo-cn">卡斐乐</span>
                </div>
                <span class="logo-divider">|</span>
                <div class="logo-brand">
                    <span class="logo-text">BACASHI</span>
                    <span class="logo-cn">倍卡西</span>
                </div>
            </div>

            <!-- 主导航 -->
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-home nav-icon"></i>首页</a></li>
                <li><a href="products.html" class="active"><i class="fas fa-box nav-icon"></i>品牌产品</a></li>
                <li><a href="service.html"><i class="fas fa-headset nav-icon"></i>服务与支持</a></li>
                <li><a href="about.html"><i class="fas fa-users nav-icon"></i>关于我们</a></li>
            </ul>

            <!-- 右侧按钮 -->
            <div class="nav-right">
                <a href="service.html#contact" class="btn-buy">购买</a>
                <div class="search-box">
                    <input type="text" placeholder="请输入关键字" id="search-input">
                    <button class="search-btn" onclick="searchProducts()">🔍</button>
                </div>
            </div>

            <button class="mobile-menu-btn"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <!-- 产品列表页面 -->
    <main class="products-page">
        <div class="page-header">
            <div class="container">
                <h1>品牌产品</h1>
                <p>CAFELE & BACASHI 系列产品</p>
            </div>
        </div>

        <div class="container">
            <!-- 品牌切换 -->
            <div class="brand-tabs">
                <button class="brand-tab active" data-brand="cafele" onclick="switchBrand('cafele')">
                    <span class="brand-name">CAFELE</span>
                    <span class="brand-cn">卡斐乐</span>
                </button>
                <button class="brand-tab" data-brand="bacashi" onclick="switchBrand('bacashi')">
                    <span class="brand-name">BACASHI</span>
                    <span class="brand-cn">倍卡西</span>
                </button>
            </div>

            <!-- 分类筛选 -->
            <div class="category-filter">
                <button class="category-btn active" data-category="all" onclick="filterCategory('all')">全部</button>
                <button class="category-btn" data-category="车用电子" onclick="filterCategory('车用电子')">车用电子</button>
                <button class="category-btn" data-category="车用内饰" onclick="filterCategory('车用内饰')">车用内饰</button>
                <button class="category-btn" data-category="车用清洗" onclick="filterCategory('车用清洗')">车用清洗</button>
                <button class="category-btn" data-category="手持风扇" onclick="filterCategory('手持风扇')">手持风扇</button>
                <button class="category-btn" data-category="桌面风扇" onclick="filterCategory('桌面风扇')">桌面风扇</button>
            </div>

            <!-- 子分类筛选（仅当选择车用电子时显示） -->
            <div id="subcategory-filter" class="subcategory-filter" style="display: none;">
                <span class="subcategory-label"><i class="fas fa-filter"></i> 细分类型：</span>
                <button class="subcategory-btn active" data-subcategory="车载充气泵" onclick="filterSubCategory('车载充气泵')">车载充气泵</button>
                <button class="subcategory-btn" data-subcategory="车载吸尘器" onclick="filterSubCategory('车载吸尘器')">车载吸尘器</button>
                <button class="subcategory-btn" data-subcategory="一体机电源" onclick="filterSubCategory('一体机电源')">一体机电源</button>
                <button class="subcategory-btn" data-subcategory="纯应急电源" onclick="filterSubCategory('纯应急电源')">纯应急电源</button>
            </div>

            <!-- 产品网格 -->
            <div id="products-grid" class="products-grid">
                <!-- 产品由 JS 动态加载 -->
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>关于 CAFELE</h4>
                    <p>专注于高品质车用电子产品的研发与销售</p>
                </div>
                <div class="footer-section">
                    <h4>联系方式</h4>
                    <p id="footer-email">邮箱：info@cafele.com</p>
                    <p id="footer-phone">电话：400-888-8888</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 CAFELE & BACASHI. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="assets/js/api.js?v=20260320005"></script>
    <script src="assets/js/main.js"></script>
    <script>
        let currentBrand = 'cafele';
        let currentCategory = 'all';
        let currentSubCategory = 'all'; // 当前子分类
        let apiInitialized = false;

        // 加载联系方式
        function loadFooterContact() {
            const contact = API.contact.get();
            if (contact) {
                const emailEl = document.getElementById('footer-email');
                const phoneEl = document.getElementById('footer-phone');
                if (emailEl && contact.email) {
                    emailEl.textContent = '邮箱：' + contact.email;
                }
                if (phoneEl && contact.phone) {
                    phoneEl.textContent = '电话：' + contact.phone;
                }
            }
        }

        // 初始化 API 并加载数据
        async function initApp() {
            if (!apiInitialized) {
                await API.init();
                // 只在 localStorage 为空时从云端同步，避免每次都请求
                const cafeleProducts = API.products.getAll();
                const bacashiProducts = API.bacashi.products.getAll();
                if (cafeleProducts.length === 0 && bacashiProducts.length === 0) {
                    await API.forceSync();
                }
                apiInitialized = true;
            }
            loadProducts();
        }

        // 切换品牌
        function switchBrand(brand) {
            currentBrand = brand;
            document.querySelectorAll('.brand-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelector(`.brand-tab[data-brand="${brand}"]`).classList.add('active');
            loadProducts();
        }

        // 分类筛选
        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.category-btn[data-category="${category}"]`).classList.add('active');

            // 如果选择的是"车用电子"，显示子分类筛选
            const subcategoryFilter = document.getElementById('subcategory-filter');
            if (category === '车用电子') {
                subcategoryFilter.style.display = 'flex';
                // 默认选中第一个子分类（车载充气泵）
                currentSubCategory = '车载充气泵';
                document.querySelectorAll('.subcategory-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector('.subcategory-btn[data-subcategory="车载充气泵"]').classList.add('active');
            } else {
                subcategoryFilter.style.display = 'none';
                currentSubCategory = null;
            }

            loadProducts();
        }

        // 子分类筛选
        function filterSubCategory(subCategory) {
            currentSubCategory = subCategory;
            document.querySelectorAll('.subcategory-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.subcategory-btn[data-subcategory="${subCategory}"]`).classList.add('active');
            loadProducts();
        }

        // 加载产品
        function loadProducts() {
            const grid = document.getElementById('products-grid');
            let products = [];

            if (currentBrand === 'cafele') {
                products = API.products.getAll();
            } else {
                products = API.bacashi.products.getAll();
            }

            // 应用分类筛选
            if (currentCategory !== 'all') {
                products = products.filter(p => p.category === currentCategory);

                // 如果是车用电子且选择了子分类，应用子分类筛选
                if (currentCategory === '车用电子' && currentSubCategory) {
                    products = products.filter(p => p.productType === currentSubCategory);
                }
            }

            // 排序
            products.sort((a, b) => a.sort - b.sort);

            if (products.length === 0) {
                grid.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无产品</p></div>';
                return;
            }

            grid.innerHTML = products.map(product => `
                <div class="product-card" onclick="window.location.href='product-detail.html?id=${product.id}&brand=${currentBrand}'">
                    <div class="product-image-wrap">
                        <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/400x300?text=${currentBrand === 'bacashi' ? 'BACASHI' : 'CAFELE'}'">
                    </div>
                    <div class="product-info">
                        <span class="product-category">${product.category}</span>
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-desc">${product.description}</p>
                    </div>
                </div>
            `).join('');
        }

        // 搜索产品
        function searchProducts() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            if (!keyword) return;

            let products = currentBrand === 'cafele' ? API.products.getAll() : API.bacashi.products.getAll();
            const filtered = products.filter(p =>
                p.name.toLowerCase().includes(keyword) ||
                p.description.toLowerCase().includes(keyword) ||
                p.category.toLowerCase().includes(keyword)
            );

            if (filtered.length === 0) {
                document.getElementById('products-grid').innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>未找到相关产品</p></div>';
            } else {
                currentCategory = 'all';
                document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector('.category-btn[data-category="all"]').classList.add('active');

                const grid = document.getElementById('products-grid');
                grid.innerHTML = filtered.sort((a, b) => a.sort - b.sort).map(product => `
                    <div class="product-card" onclick="window.location.href='product-detail.html?id=${product.id}&brand=${currentBrand}'">
                        <div class="product-image-wrap">
                            <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/400x300?text=${currentBrand === 'bacashi' ? 'BACASHI' : 'CAFELE'}'">
                        </div>
                        <div class="product-info">
                            <span class="product-category">${product.category}</span>
                            <h3 class="product-name">${product.name}</h3>
                            <p class="product-desc">${product.description}</p>
                        </div>
                    </div>
                `).join('');
            }
        }

        // 页面加载初始化
        document.addEventListener('DOMContentLoaded', function() {
            initApp();
            loadFooterContact();
        });
    </script>
</body>
</html>
